    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0a1628; color: #fff; }
    .page { padding: 12px; height: 100%; display: flex; flex-direction: column; }
    .header { margin-bottom: 12px; flex-shrink: 0; }

    .header p { color: #6b7b8c; margin-top: 4px; font-size: 12px; }

    .btn-primary { background: #1890ff; color: white; }
    .btn-default { background: #162236; color: #a6b5c7; border: 1px solid #1f3a5f; }
    .btn-ghost { background: transparent; color: #1890ff; border: 1px solid #1890ff; }
    
    .stat-row, .card-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 12px; flex-shrink: 0; }

    .stat-card.success::before { background: #52c41a; }
    .stat-card.error::before { background: #ff4d4f; }
    .stat-content { display: flex; justify-content: space-between; align-items: center; }
    .stat-value { font-size: 24px; font-weight: 700; }
    .stat-label { font-size: 11px; color: #6b7b8c; margin-bottom: 4px; }
    .stat-icon { width: 36px; height: 36px; border-radius: 6px; display: flex; align-items: center; justify-content: center; font-size: 18px; }
    
    .main-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 12px; flex-shrink: 0; }
    
    .card { background: #162236; border: 1px solid #1f3a5f; border-radius: 6px; padding: 12px; }
    .card-title { font-size: 13px; font-weight: 500; margin-bottom: 10px; padding-bottom: 8px; border-bottom: 1px solid #1f3a5f; }
    
    .pie-container { display: flex; align-items: center; justify-content: center; gap: 15px; min-height: 150px; }
    .pie-chart { width: 120px; height: 120px; }
    .pie-legend { display: flex; flex-direction: column; gap: 5px; }
    .legend-item { display: flex; align-items: center; gap: 6px; font-size: 11px; color: #a6b5c7; }
    .legend-color { width: 10px; height: 10px; border-radius: 50%; }
    
    .project-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
    .project-card { background: #0f1a29; border: 1px solid #1f3a5f; border-radius: 6px; padding: 10px; cursor: pointer; transition: all 0.2s; min-height: 160px; }
    .card.fixed-height { min-height: 150px; }
    .project-card:hover { border-color: #1890ff; }
    .project-card.placeholder { cursor: default; opacity: 0; }
    .project-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
    .project-title { font-size: 12px; font-weight: 600; }
    .project-info { display: flex; gap: 10px; margin-bottom: 8px; font-size: 10px; color: #a6b5c7; }
    .project-step { font-size: 10px; color: #6b7b8c; margin-bottom: 8px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .project-progress { margin-bottom: 3px; display: flex; justify-content: space-between; font-size: 10px; color: #6b7b8c; }
    .progress-bar { height: 5px; background: #1f3a5f; border-radius: 3px; overflow: hidden; }
    .progress-fill { height: 100%; background: #1890ff; border-radius: 3px; }
    .project-footer { display: flex; justify-content: space-between; margin-top: 8px; font-size: 10px; color: #6b7b8c; }
    
    .mini-project-card { background: rgba(26, 42, 62, 0.6); border: 1px solid #1f3a5f; border-radius: 4px; padding: 8px; cursor: pointer; transition: all 0.2s; min-height: 70px; }
    .mini-project-card:hover { background: rgba(26, 42, 62, 0.8); border-color: #1890ff; }
    .mini-project-card.placeholder { background: rgba(26, 42, 62, 0.2); border: 1px dashed #1f3a5f; cursor: default; }
    .mini-project-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; font-size: 11px; font-weight: 500; }
    .mini-project-info { font-size: 9px; color: #6b7b8c; margin-bottom: 4px; }
    .mini-project-step { font-size: 9px; color: #6b7b8c; margin-bottom: 4px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .mini-progress { display: flex; align-items: center; gap: 6px; margin-bottom: 4px; }
    .mini-progress .progress-bar { height: 4px; flex: 1; }
    .mini-progress span { font-size: 9px; color: #6b7b8c; }
    .mini-info { font-size: 9px; color: #6b7b8c; }
    
    .tag { display: inline-block; padding: 1px 6px; border-radius: 3px; font-size: 10px; }
    .tag-processing { background: rgba(24, 144, 255, 0.15); color: #1890ff; }
    .tag-ready { background: rgba(250, 173, 20, 0.15); color: #faad14; }

    .tag-done { background: rgba(82, 196, 26, 0.15); color: #52c41a; }
    .tag-error { background: rgba(255, 77, 79, 0.15); color: #ff4d4f; }
    
    .btn-suspend { padding: 2px 8px; border: none; border-radius: 3px; cursor: pointer; font-size: 10px; transition: all 0.2s; background: rgba(255, 77, 79, 0.15); color: #ff4d4f; border: 1px solid rgba(255, 77, 79, 0.3); }

    function createPieChartSVG() {
      var total = mockProjects.length;
      var data = [
        { status: '试验中', count: mockProjects.filter(function(p) { return p.status === '试验中'; }).length, color: '#1890ff' },
        { status: '准备中', count: mockProjects.filter(function(p) { return p.status === '准备中'; }).length, color: '#faad14' },
        { status: '排队中', count: mockProjects.filter(function(p) { return p.status === '排队中'; }).length, color: '#6b7b8c' },
        { status: '已完成', count: mockProjects.filter(function(p) { return p.status === '已完成'; }).length, color: '#52c41a' },
        { status: '异常挂起', count: mockProjects.filter(function(p) { return p.status === '异常挂起'; }).length, color: '#ff4d4f' }
      ];
      
      var currentAngle = 0;
      var svg = '';
      data.forEach(function(item) {
        if (item.count === 0) return;
        var angle = (item.count / total) * 360;
        var polarToCartesian = function(ang) {
          var rad = (ang - 90) * Math.PI / 180;
          return { x: 80 + 55 * Math.cos(rad), y: 80 + 55 * Math.sin(rad) };
        };
        var s = polarToCartesian(currentAngle + angle);
        var e = polarToCartesian(currentAngle);
        var largeArc = angle <= 180 ? 0 : 1;
        var d = 'M 80 80 L ' + s.x + ' ' + s.y + ' A 55 55 0 ' + largeArc + ' 0 ' + e.x + ' ' + e.y + ' Z';
        svg += '<path d="' + d + '" fill="' + item.color + '" stroke="#162236" stroke-width="2"/>';
        currentAngle += angle;
      });
      svg += '<circle cx="80" cy="80" r="35" fill="#162236"/>';
      svg += '<text x="80" y="76" text-anchor="middle" fill="#6b7b8c" font-size="10">项目总数</text>';
      svg += '<text x="80" y="92" text-anchor="middle" fill="#fff" font-size="16" font-weight="bold">' + total + '</text>';

        return;

      if (project.status === '异常挂起') {

        project.steps.forEach(function(step) {
          if (step.status === '异常挂起') {
            step.status = '未开始';

    }
    
    window.onload = function() {
      renderDashboard();
    };
  </script>
