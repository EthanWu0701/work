<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>贪吃蛇</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #1a1a2e;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    font-family: 'Segoe UI', sans-serif;
    user-select: none;
  }
  .game-container {
    background: #16213e;
    padding: 30px;
    border-radius: 16px;
    box-shadow: 0 0 40px rgba(0,0,0,.5);
    text-align: center;
  }
  .header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 16px;
    color: #e0e0e0;
  }
  .header h1 { font-size: 24px; color: #4ecca3; }
  .score-box { font-size: 18px; }
  .score-box span { color: #4ecca3; font-weight: bold; }
  canvas {
    display: block;
    margin: 0 auto;
    border: 2px solid #0f3460;
    border-radius: 8px;
    background: #0f3460;
  }
  .controls {
    margin-top: 16px;
    display: flex;
    justify-content: center;
    gap: 12px;
    flex-wrap: wrap;
  }
  .controls button {
    background: #4ecca3;
    border: none;
    color: #16213e;
    padding: 10px 28px;
    border-radius: 8px;
    font-size: 16px;
    font-weight: bold;
    cursor: pointer;
    transition: background .2s;
  }
  .controls button:hover { background: #3db88b; }
  .controls button:active { transform: scale(.96); }
  .controls .restart { background: #e94560; color: #fff; }
  .controls .restart:hover { background: #d63850; }
  .tip {
    margin-top: 12px;
    color: #888;
    font-size: 13px;
  }
  /* 移动端方向键 */
  .dpad {
    display: none;
    margin-top: 16px;
    justify-content: center;
  }
  .dpad-row { display: flex; justify-content: center; }
  .dpad-btn {
    width: 56px;
    height: 56px;
    margin: 3px;
    border: none;
    border-radius: 12px;
    background: #0f3460;
    color: #4ecca3;
    font-size: 24px;
    cursor: pointer;
    touch-action: manipulation;
  }
  .dpad-btn:active { background: #1a4a7a; }
  @media (pointer: coarse) {
    .dpad { display: block; }
    .controls button { padding: 12px 32px; font-size: 18px; }
  }
  @media (max-width: 480px) {
    .game-container { padding: 16px; }
    canvas { width: 100%; height: auto; max-width: 400px; }
  }
</style>
</head>
<body>

<div class="game-container">
  <div class="header">
    <h1>🐍 贪吃蛇</h1>
    <div class="score-box">得分: <span id="score">0</span></div>
  </div>

  <canvas id="gameCanvas" width="400" height="400"></canvas>

  <div class="controls">
    <button class="restart" id="restartBtn">重新开始</button>
  </div>

  <div class="dpad">
    <div class="dpad-row">
      <button class="dpad-btn" data-dir="up">▲</button>
    </div>
    <div class="dpad-row">
      <button class="dpad-btn" data-dir="left">◀</button>
      <button class="dpad-btn" data-dir="down">▼</button>
      <button class="dpad-btn" data-dir="right">▶</button>
    </div>
  </div>

  <div class="tip">方向键 / WASD 控制移动</div>
</div>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const scoreEl = document.getElementById('score');

const GRID_SIZE = 20;
const TILE_COUNT = canvas.width / GRID_SIZE; // 20

let snake, direction, nextDirection, foods, score, gameLoop, gameOver;
const MAX_FOOD = 5;

function init() {
  snake = [
    { x: 10, y: 10 },
    { x: 9, y: 10 },
    { x: 8, y: 10 },
  ];
  direction = { x: 1, y: 0 };
  nextDirection = { x: 1, y: 0 };
  score = 0;
  gameOver = false;
  scoreEl.textContent = '0';
  foods = [];
  for (let i = 0; i < MAX_FOOD; i++) {
    spawnOneFood();
  }
  draw();
  clearInterval(gameLoop);
  gameLoop = setInterval(tick, 150);
}

function spawnOneFood() {
  const free = [];
  for (let x = 0; x < TILE_COUNT; x++) {
    for (let y = 0; y < TILE_COUNT; y++) {
      if (!snake.some(s => s.x === x && s.y === y) && !foods.some(f => f.x === x && f.y === y)) {
        free.push({ x, y });
      }
    }
  }
  if (free.length === 0) return;
  foods.push(free[Math.floor(Math.random() * free.length)]);
}

function tick() {
  if (gameOver) return;

  direction = { ...nextDirection };
  const head = { x: snake[0].x + direction.x, y: snake[0].y + direction.y };

  // 撞墙
  if (head.x < 0 || head.x >= TILE_COUNT || head.y < 0 || head.y >= TILE_COUNT) {
    endGame();
    return;
  }

  // 撞自身
  if (snake.some(s => s.x === head.x && s.y === head.y)) {
    endGame();
    return;
  }

  snake.unshift(head);

  const foodIndex = foods.findIndex(f => f.x === head.x && f.y === head.y);
  if (foodIndex !== -1) {
    score += 10;
    scoreEl.textContent = score;
    playEatSound();
    foods.splice(foodIndex, 1);
    spawnOneFood();
  } else {
    snake.pop();
  }

  draw();
}

function endGame() {
  gameOver = true;
  clearInterval(gameLoop);
  playGameOverSound();
  draw();
}

function draw() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  // 网格
  ctx.strokeStyle = '#1a4a7a';
  ctx.lineWidth = 0.5;
  for (let i = 0; i <= TILE_COUNT; i++) {
    ctx.beginPath();
    ctx.moveTo(i * GRID_SIZE, 0);
    ctx.lineTo(i * GRID_SIZE, canvas.height);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(0, i * GRID_SIZE);
    ctx.lineTo(canvas.width, i * GRID_SIZE);
    ctx.stroke();
  }

  // 蛇头（亮橙色）
  const head = snake[0];
  ctx.shadowBlur = 10;
  ctx.shadowColor = '#ffa500';
  ctx.fillStyle = '#ff8c00';
  const pad = 1;
  ctx.beginPath();
  ctx.roundRect(head.x * GRID_SIZE + pad, head.y * GRID_SIZE + pad, GRID_SIZE - pad * 2, GRID_SIZE - pad * 2, 6);
  ctx.fill();
  // 蛇眼
  ctx.shadowBlur = 0;
  ctx.fillStyle = '#fff';
  const ex = head.x * GRID_SIZE + (direction.x === -1 ? 5 : direction.x === 1 ? 13 : 9);
  const ey = head.y * GRID_SIZE + (direction.y === -1 ? 5 : direction.y === 1 ? 13 : 9);
  ctx.beginPath(); ctx.arc(ex, ey, 2.5, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.arc(ex + (direction.y === 0 ? 0 : 4), ey + (direction.x === 0 ? 0 : 4), 2.5, 0, Math.PI * 2); ctx.fill();

  // 蛇身（蓝色渐变）
  for (let i = 1; i < snake.length; i++) {
    const s = snake[i];
    const ratio = 1 - i / snake.length * 0.5;
    const r = Math.floor(25 + 55 * ratio);
    const gCh = Math.floor(110 + 85 * ratio);
    const b = Math.floor(210 + 45 * ratio);
    ctx.fillStyle = `rgb(${r}, ${gCh}, ${b})`;
    ctx.shadowBlur = 4;
    ctx.shadowColor = '#5eb3ff';
    ctx.beginPath();
    ctx.roundRect(s.x * GRID_SIZE + 1, s.y * GRID_SIZE + 1, GRID_SIZE - 2, GRID_SIZE - 2, 4);
    ctx.fill();
  }
  ctx.shadowBlur = 0;

  // 食物
  for (let f = 0; f < foods.length; f++) {
    const food = foods[f];
    const cx = food.x * GRID_SIZE + GRID_SIZE / 2;
    const cy = food.y * GRID_SIZE + GRID_SIZE / 2;
    const r = GRID_SIZE / 2 - 2;
    ctx.shadowBlur = 12;
    ctx.shadowColor = '#e94560';
    ctx.fillStyle = '#e94560';
    ctx.beginPath();
    ctx.arc(cx, cy, r, 0, Math.PI * 2);
    ctx.fill();
    // 高光
    ctx.shadowBlur = 0;
    ctx.fillStyle = 'rgba(255,255,255,0.3)';
    ctx.beginPath();
    ctx.arc(cx - 3, cy - 3, r * 0.3, 0, Math.PI * 2);
    ctx.fill();
    ctx.shadowBlur = 0;
  }

  // 游戏结束
  if (gameOver) {
    ctx.fillStyle = 'rgba(0,0,0,0.6)';
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    ctx.fillStyle = '#e94560';
    ctx.font = 'bold 36px "Segoe UI", sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('游戏结束', canvas.width / 2, canvas.height / 2 - 16);
    ctx.fillStyle = '#e0e0e0';
    ctx.font = '18px "Segoe UI", sans-serif';
    ctx.fillText(`得分: ${score}`, canvas.width / 2, canvas.height / 2 + 28);
  }
}

// roundRect polyfill for older browsers
if (!CanvasRenderingContext2D.prototype.roundRect) {
  CanvasRenderingContext2D.prototype.roundRect = function (x, y, w, h, r) {
    if (r > w / 2) r = w / 2;
    if (r > h / 2) r = h / 2;
    this.moveTo(x + r, y);
    this.lineTo(x + w - r, y);
    this.quadraticCurveTo(x + w, y, x + w, y + r);
    this.lineTo(x + w, y + h - r);
    this.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
    this.lineTo(x + r, y + h);
    this.quadraticCurveTo(x, y + h, x, y + h - r);
    this.lineTo(x, y + r);
    this.quadraticCurveTo(x, y, x + r, y);
    return this;
  };
}

// ===== BGM: Beyond - 真的爱你 (芯片音乐版) =====
let audioCtx, bgmTimer = null;

function initAudio() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  if (audioCtx.state === 'suspended') audioCtx.resume();
}

function playNote(freq, t, dur, type = 'square', vol = 0.08) {
  const o = audioCtx.createOscillator(), g = audioCtx.createGain();
  o.type = type;
  o.frequency.setValueAtTime(freq, t);
  g.gain.setValueAtTime(vol, t);
  g.gain.exponentialRampToValueAtTime(0.001, t + dur);
  o.connect(g); g.connect(audioCtx.destination);
  o.start(t); o.stop(t + dur);
}

function playKick(t) {
  const o = audioCtx.createOscillator(), g = audioCtx.createGain();
  o.type = 'sine';
  o.frequency.setValueAtTime(150, t); o.frequency.exponentialRampToValueAtTime(40, t + 0.12);
  g.gain.setValueAtTime(0.2, t); g.gain.exponentialRampToValueAtTime(0.001, t + 0.18);
  o.connect(g); g.connect(audioCtx.destination);
  o.start(t); o.stop(t + 0.18);
}

function playHat(t) {
  const len = audioCtx.sampleRate * 0.04;
  const buf = audioCtx.createBuffer(1, len, audioCtx.sampleRate);
  const d = buf.getChannelData(0);
  for (let i = 0; i < len; i++) d[i] = (Math.random() * 2 - 1) * (1 - i / len) * 0.6;
  const s = audioCtx.createBufferSource(); s.buffer = buf;
  const g = audioCtx.createGain(); g.gain.setValueAtTime(0.05, t); g.gain.exponentialRampToValueAtTime(0.001, t + 0.04);
  s.connect(g); g.connect(audioCtx.destination); s.start(t);
}

// 小星星 主旋律 (C大调, 100 BPM)
const MELODY = [
  // 小星星亮晶晶 (Twinkle Twinkle Little Star)
  // "Twinkle twinkle little star"
  262, 262, 392, 392,  440, 440, 392, 0,    // C  C  G  G  A  A  G  -
  // "How I wonder what you are"
  349, 349, 330, 330,  294, 294, 262, 0,    // D  D  C  C  Bb Bb A  A (wait: F F E E D D C)
  // "Up above the world so high"
  392, 392, 349, 349,  330, 330, 294, 0,    // G  G  F  F  E  E  D  -
  // "Like a diamond in the sky"
  392, 392, 349, 349,  330, 330, 294, 0,    // G  G  F  F  E  E  D  -
  // "Twinkle twinkle little star"
  262, 262, 392, 392,  440, 440, 392, 0,    // C  C  G  G  A  A  G  -
  // "How I wonder what you are"
  349, 349, 330, 330,  294, 294, 262, 0,    // F  F  E  E  D  D  C  -
];
const BASS = [131, 175, 196, 175, 165, 147, 131, 165]; // C3 F3 G3 F3 E3 D3 C3 E3

function scheduleBGM() {
  const bpm = 100;
  const beat = 60 / bpm;
  const now = audioCtx.currentTime;

  for (let i = 0; i < MELODY.length; i++) {
    const t = now + i * beat;
    if (MELODY[i] > 0) {
      const vol = (i % 8 === 0) ? 0.1 : 0.07;
      playNote(MELODY[i], t, beat * 0.7, 'square', vol);
    }
    if (i % 2 === 0) playNote(BASS[(i / 2) % BASS.length], t + 0.02, beat * 0.8, 'triangle', 0.12);
    if (i % 4 === 0 || i % 4 === 2) playKick(t);
    if (i % 4 === 1 || i % 4 === 3) playHat(t);
  }

  bgmTimer = setTimeout(scheduleBGM, (MELODY.length * beat - 0.05) * 1000);
}

function startBGM() {
  initAudio();
  scheduleBGM();
}

// 音效
function playEatSound() {
  initAudio();
  if (audioCtx.state === 'suspended') audioCtx.resume();
  const t = audioCtx.currentTime;
  playNote(988, t, 0.08, 'square', 0.1);
  playNote(1319, t + 0.06, 0.12, 'square', 0.1);
}

function playGameOverSound() {
  initAudio();
  const t = audioCtx.currentTime;
  playNote(330, t, 0.3, 'sawtooth', 0.08);
  playNote(262, t + 0.25, 0.4, 'sawtooth', 0.08);
  playNote(196, t + 0.55, 0.6, 'sawtooth', 0.06);
}

// ===== 键盘控制 =====
function handleKey(e) {
  const key = e.key;
  const map = {
    ArrowUp:    { x: 0, y: -1 },
    ArrowDown:  { x: 0, y: 1 },
    ArrowLeft:  { x: -1, y: 0 },
    ArrowRight: { x: 1, y: 0 },
    w: { x: 0, y: -1 }, W: { x: 0, y: -1 },
    s: { x: 0, y: 1 },  S: { x: 0, y: 1 },
    a: { x: -1, y: 0 }, A: { x: -1, y: 0 },
    d: { x: 1, y: 0 },  D: { x: 1, y: 0 },
  };
  const newDir = map[key];
  if (!newDir) return;
  e.preventDefault();
  // 禁止原地掉头
  if (newDir.x === -direction.x && newDir.y === -direction.y) return;
  nextDirection = newDir;
}

// 触摸按钮控制
document.querySelectorAll('.dpad-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    const map = { up: { x: 0, y: -1 }, down: { x: 0, y: 1 }, left: { x: -1, y: 0 }, right: { x: 1, y: 0 } };
    const newDir = map[btn.dataset.dir];
    if (!newDir) return;
    if (newDir.x === -direction.x && newDir.y === -direction.y) return;
    nextDirection = newDir;
  });
});

document.addEventListener('keydown', handleKey);
document.getElementById('restartBtn').addEventListener('click', init);

// 开始游戏
init();

// 首次交互自动播放BGM（浏览器音频策略需要用户交互）
function firstInteraction() {
  startBGM();
  document.removeEventListener('keydown', firstInteraction);
  document.removeEventListener('click', firstInteraction);
}
document.addEventListener('keydown', firstInteraction);
document.addEventListener('click', firstInteraction);
</script>
</body>
</html>
